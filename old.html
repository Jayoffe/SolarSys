<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System — Explore the Cosmos</title>
    <style>
        :root {
            --panel-bg: rgba(6, 6, 22, 0.95);
            --text-light: #e0e0f0;
            --text-muted: #9090b8;
            --accent: #c8a860;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000005; width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', system-ui, sans-serif;
            cursor: grab; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent; color: var(--text-light);
        }
        body:active { cursor: grabbing; }
        body.pointer { cursor: pointer; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
        .vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(2, 0, 8, 0.35) 72%, rgba(2, 0, 8, 0.78) 100%);
        }
        .title {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
            pointer-events: none; text-align: center; transition: opacity 0.6s ease;
        }
        .title h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.14em; color: #e8e0d0; text-shadow: 0 0 35px rgba(180, 150, 100, 0.55); margin: 0; }
        .title p { font-size: 0.65rem; letter-spacing: 0.24em; color: rgba(200, 180, 150, 0.65); margin-top: 2px; }
        .tooltip {
            position: fixed; pointer-events: none; z-index: 20; background: rgba(8, 8, 24, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.16); border-radius: 6px; padding: 6px 14px;
            font-size: 0.8rem; color: #e8e8f8; opacity: 0; transition: opacity 0.15s;
            transform: translate(-50%, -140%); white-space: nowrap; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }
        .tooltip.show { opacity: 1; }
        .info-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 30;
            background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px;
            padding: 26px 32px; max-width: 520px; width: 92%; backdrop-filter: blur(32px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.85); text-align: center;
            opacity: 0; pointer-events: none; transition: opacity 0.45s ease, transform 0.5s cubic-bezier(0.22, 0.12, 0.15, 1);
            transform: translateX(-50%) translateY(22px);
        }
        .info-panel.active { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .info-panel h2 { font-size: 1.75rem; font-weight: 700; color: #f2eada; margin-bottom: 4px; letter-spacing: 0.04em; }
        .info-panel .type { font-size: 0.72rem; letter-spacing: 0.11em; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; }
        .info-panel .facts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; text-align: left; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 14px; }
        .info-panel .facts-grid span { color: #d4d4ea; font-weight: 600; }
        .info-panel .desc { font-size: 0.84rem; color: #b4b4cc; line-height: 1.55; margin-bottom: 18px; }
        .info-panel .btn-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .info-panel button {
            padding: 9px 26px; border-radius: 26px; background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #d0d0e0; cursor: pointer;
            font-size: 0.8rem; letter-spacing: 0.05em; transition: all 0.35s;
        }
        .info-panel button:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.45); color: #fff; box-shadow: 0 0 24px rgba(190, 160, 100, 0.3); }
        .nav-arrows {
            position: fixed; z-index: 25; top: 50%; left: 16px; right: 16px;
            transform: translateY(-50%); display: flex; justify-content: space-between;
            pointer-events: none; opacity: 0; transition: opacity 0.45s ease;
        }
        .nav-arrows.active { opacity: 1; pointer-events: all; }
        .nav-arrow {
            width: 50px; height: 50px; border-radius: 50%; background: rgba(8, 8, 28, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.16); color: #d0d0e0; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            transition: all 0.35s; backdrop-filter: blur(12px);
        }
        .nav-arrow:hover { background: rgba(22, 22, 48, 0.9); border-color: rgba(255, 255, 255, 0.5); color: #fff; box-shadow: 0 0 28px rgba(170, 140, 90, 0.4); transform: scale(1.08); }
        .counter {
            position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%); z-index: 25;
            font-size: 0.72rem; letter-spacing: 0.08em; color: rgba(210, 190, 155, 0.72);
            opacity: 0; pointer-events: none; transition: opacity 0.45s ease;
        }
        .counter.active { opacity: 1; }
        .hint {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5;
            pointer-events: none; font-size: 0.7rem; letter-spacing: 0.06em;
            color: rgba(180, 170, 150, 0.45); transition: opacity 0.7s;
        }
        @media (max-width: 768px) {
            .info-panel { padding: 16px 18px; border-radius: 14px; }
            .info-panel h2 { font-size: 1.3rem; }
            .info-panel .facts-grid { grid-template-columns: 1fr; gap: 4px; font-size: 0.72rem; }
            .nav-arrow { width: 42px; height: 42px; font-size: 1.2rem; }
            .nav-arrows { left: 8px; right: 8px; }
            .hint { bottom: 14px; font-size: 0.62rem; }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="title" id="titleArea"><h1>SOLAR SYSTEM</h1><p>EXPLORE • DISCOVER</p></div>
    <div class="tooltip" id="tooltip"></div>
    <div class="hint" id="hint">🖱 Drag to rotate • Scroll to zoom • Click a planet</div>
    <div class="nav-arrows" id="navArrows">
        <button class="nav-arrow" id="navLeft">◀</button>
        <button class="nav-arrow" id="navRight">▶</button>
    </div>
    <div class="counter" id="counter">1 / 9</div>
    <div class="info-panel" id="infoPanel">
        <h2 id="infoName"></h2>
        <p class="type" id="infoType"></p>
        <div class="facts-grid" id="infoFacts"></div>
        <p class="desc" id="infoDesc"></p>
        <div class="btn-row"><button id="btnClose">Close Exploration</button></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // DOM elements
        const tooltip = document.getElementById('tooltip');
        const infoPanel = document.getElementById('infoPanel');
        const infoName = document.getElementById('infoName');
        const infoType = document.getElementById('infoType');
        const infoFacts = document.getElementById('infoFacts');
        const infoDesc = document.getElementById('infoDesc');
        const btnClose = document.getElementById('btnClose');
        const navArrows = document.getElementById('navArrows');
        const navLeft = document.getElementById('navLeft');
        const navRight = document.getElementById('navRight');
        const counter = document.getElementById('counter');
        const titleArea = document.getElementById('titleArea');
        const hint = document.getElementById('hint');

        // Planet data
        const order = ['sun', 'mercury', 'venus', 'earth', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune'];
        const planetData = {
            sun: { name: 'Sun', type: 'G-Type Star', facts: [['Diameter', '1,392,700 km'], ['Temp', '5,500°C'], ['Age', '4.6B years'], ['Mass', '1.989×10³⁰ kg']], desc: 'The star at the center of our solar system. Its gravity holds everything in orbit, and nuclear fusion provides energy that sustains life on Earth.', color: 0xffaa30 },
            mercury: { name: 'Mercury', type: 'Terrestrial Planet', facts: [['Diameter', '4,879 km'], ['Distance', '57.9M km'], ['Orbit', '88 days'], ['Temp', '-180 to 430°C']], desc: 'The smallest planet and closest to the Sun. Heavily cratered with no atmosphere and extreme temperature swings.', color: 0xb0b0b0 },
            venus: { name: 'Venus', type: 'Terrestrial Planet', facts: [['Diameter', '12,104 km'], ['Distance', '108.2M km'], ['Orbit', '225 days'], ['Temp', '462°C avg']], desc: 'Earth\'s toxic twin shrouded in sulfuric acid clouds. Hottest planet due to runaway greenhouse effect.', color: 0xe0c090 },
            earth: { name: 'Earth', type: 'Terrestrial Planet', facts: [['Diameter', '12,742 km'], ['Distance', '149.6M km'], ['Orbit', '365.25 days'], ['Moons', '1']], desc: 'Our home — the only known planet with life. Liquid water covers 71% of its surface with oxygen-rich atmosphere.', color: 0x4a90e0 },
            mars: { name: 'Mars', type: 'Terrestrial Planet', facts: [['Diameter', '6,779 km'], ['Distance', '227.9M km'], ['Orbit', '687 days'], ['Moons', '2']], desc: 'The Red Planet with Olympus Mons (tallest volcano) and Valles Marineris canyon. Water once flowed here.', color: 0xd05030 },
            jupiter: { name: 'Jupiter', type: 'Gas Giant', facts: [['Diameter', '139,820 km'], ['Distance', '778.6M km'], ['Orbit', '11.86 years'], ['Moons', '95+']], desc: 'Largest planet — mass exceeds all others combined. Great Red Spot is a storm raging 350+ years.', color: 0xd0a870 },
            saturn: { name: 'Saturn', type: 'Gas Giant', facts: [['Diameter', '116,460 km'], ['Distance', '1.434B km'], ['Orbit', '29.46 years'], ['Moons', '146+']], desc: 'Spectacular ring system of ice and rock. Least dense planet — could float in water.', color: 0xe8d8a0 },
            uranus: { name: 'Uranus', type: 'Ice Giant', facts: [['Diameter', '50,724 km'], ['Distance', '2.871B km'], ['Orbit', '84.01 years'], ['Moons', '27']], desc: 'Ice giant tilted 98° on its side. Blue-green from methane. Discovered by Herschel in 1781.', color: 0x88ccff },
            neptune: { name: 'Neptune', type: 'Ice Giant', facts: [['Diameter', '49,244 km'], ['Distance', '4.495B km'], ['Orbit', '164.8 years'], ['Moons', '16']], desc: 'Windiest planet (2,100+ km/h). First found by math prediction. Deep blue from methane.', color: 0x4470e0 }
        };

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000008);
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.3, 1000);
        camera.position.set(0, 18, 34);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.minDistance = 5;
        controls.maxDistance = 130;
        controls.maxPolarAngle = Math.PI * 0.85;
        controls.zoomSpeed = 0.85;
        controls.rotateSpeed = 0.45;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.2;
        controls.update();

        // Lighting
        scene.add(new THREE.AmbientLight(0x1a1a3a, 2.5));
        const sunLight = new THREE.PointLight(0xffffff, 350, 500, 0.5);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.3;
        sunLight.shadow.camera.far = 500;
        scene.add(sunLight);
        scene.add(new THREE.PointLight(0xffcc88, 120, 250, 0.4));

        // Starfield
        function createStarfield() {
            const group = new THREE.Group();
            // Distant stars
            const g1 = new THREE.BufferGeometry();
            const c1 = 2500;
            const p1 = new Float32Array(c1 * 3);
            const col1 = new Float32Array(c1 * 3);
            for (let i = 0; i < c1; i++) {
                const r = 180 + Math.random() * 400;
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos(2 * Math.random() - 1);
                p1[i * 3] = Math.sin(ph) * Math.cos(th) * r;
                p1[i * 3 + 1] = Math.sin(ph) * Math.sin(th) * r;
                p1[i * 3 + 2] = Math.cos(ph) * r;
                const t = Math.random();
                if (t < 0.05) { col1[i * 3] = 1.0;
                    col1[i * 3 + 1] = 0.85;
                    col1[i * 3 + 2] = 0.55; } else if (t < 0.10) { col1[i * 3] = 0.5;
                    col1[i * 3 + 1] = 0.65;
                    col1[i * 3 + 2] = 1.0; } else if (t < 0.15) { col1[i * 3] = 0.95;
                    col1[i * 3 + 1] = 0.9;
                    col1[i * 3 + 2] = 0.95; } else { const b = 0.6 + Math.random() * 0.4;
                    col1[i * 3] = b;
                    col1[i * 3 + 1] = b;
                    col1[i * 3 + 2] = b; }
            }
            g1.setAttribute('position', new THREE.BufferAttribute(p1, 3));
            g1.setAttribute('color', new THREE.BufferAttribute(col1, 3));
            group.add(new THREE.Points(g1, new THREE.PointsMaterial({ size: 0.22, vertexColors: true,
                blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.9,
                sizeAttenuation: true })));
            // Bright stars
            const g2 = new THREE.BufferGeometry();
            const c2 = 800;
            const p2 = new Float32Array(c2 * 3);
            for (let i = 0; i < c2; i++) {
                const r = 120 + Math.random() * 300;
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos(2 * Math.random() - 1);
                p2[i * 3] = Math.sin(ph) * Math.cos(th) * r;
                p2[i * 3 + 1] = Math.sin(ph) * Math.sin(th) * r;
                p2[i * 3 + 2] = Math.cos(ph) * r;
            }
            g2.setAttribute('position', new THREE.BufferAttribute(p2, 3));
            group.add(new THREE.Points(g2, new THREE.PointsMaterial({ size: 0.35, color: 0xffffff,
                blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7,
                sizeAttenuation: true })));
            // Nebulae
            const nebColors = [0x442288, 0x224466, 0x663344, 0x334455, 0x553366, 0x224444];
            for (let n = 0; n < 6; n++) {
                const ng = new THREE.BufferGeometry();
                const nc = 300;
                const np = new Float32Array(nc * 3);
                const cx = (Math.random() - 0.5) * 300,
                    cy = (Math.random() - 0.5) * 150,
                    cz = (Math.random() - 0.5) * 300;
                for (let j = 0; j < nc; j++) {
                    np[j * 3] = cx + (Math.random() - 0.5) * 120;
                    np[j * 3 + 1] = cy + (Math.random() - 0.5) * 60;
                    np[j * 3 + 2] = cz + (Math.random() - 0.5) * 120;
                }
                ng.setAttribute('position', new THREE.BufferAttribute(np, 3));
                group.add(new THREE.Points(ng, new THREE.PointsMaterial({ size: 3 + Math.random() * 5, color: nebColors[
                        n], blending: THREE.AdditiveBlending, depthWrite: false, transparent: true,
                    opacity: 0.04, sizeAttenuation: true })));
            }
            return group;
        }
        scene.add(createStarfield());

        // Texture helper
        function tex(w, h, fn) {
            const c = document.createElement('canvas');
            c.width = w;
            c.height = h;
            fn(c.getContext('2d'), w, h);
            const t = new THREE.CanvasTexture(c);
            t.colorSpace = THREE.SRGBColorSpace;
            t.wrapS = THREE.RepeatWrapping;
            t.wrapU = THREE.ClampToEdgeWrapping;
            t.minFilter = THREE.LinearMipmapLinearFilter;
            t.magFilter = THREE.LinearFilter;
            t.generateMipmaps = true;
            return t;
        }

        function sunTex() {
            return tex(1024, 512, (ctx, w, h) => {
                const g = ctx.createRadialGradient(w / 2, h / 2, w * 0.01, w / 2, h / 2, w * 0.75);
                g.addColorStop(0, '#ffffff');
                g.addColorStop(0.03, '#fffef0');
                g.addColorStop(0.08, '#fff8c0');
                g.addColorStop(0.18, '#ffe898');
                g.addColorStop(0.32, '#ffc840');
                g.addColorStop(0.50, '#ff9018');
                g.addColorStop(0.70, '#e84808');
                g.addColorStop(0.88, '#a01800');
                g.addColorStop(1, '#400800');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 2000; i++) {
                    const x = Math.random() * w,
                        y = Math.random() * h;
                    const d = Math.hypot(x - w / 2, y - h / 2) / (w * 0.5);
                    if (d < 0.7) {
                        ctx.fillStyle =
                            `rgba(255,${200 + Math.random() * 55},${30 + Math.random() * 80},${(1 - d) * 0.3 + Math.random() * 0.2})`;
                        ctx.beginPath();
                        ctx.arc(x, y, Math.random() * 3 + 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                for (let i = 0; i < 15; i++) {
                    const sx = w / 2 + (Math.random() - 0.5) * w * 0.5,
                        sy = h / 2 + (Math.random() - 0.5) * h * 0.5;
                    const sr = 8 + Math.random() * 25;
                    const sg = ctx.createRadialGradient(sx, sy, sr * 0.1, sx, sy, sr);
                    sg.addColorStop(0, 'rgba(200,120,30,0.5)');
                    sg.addColorStop(0.5, 'rgba(255,160,40,0.2)');
                    sg.addColorStop(1, 'rgba(255,200,60,0)');
                    ctx.fillStyle = sg;
                    ctx.beginPath();
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function mercuryTex() {
            return tex(512, 256, (ctx, w, h) => {
                const g = ctx.createRadialGradient(w * 0.3, h * 0.3, 0, w / 2, h / 2, w * 0.7);
                g.addColorStop(0, '#d0d0d0');
                g.addColorStop(0.5, '#a0a0a0');
                g.addColorStop(1, '#505050');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 3000; i++) {
                    ctx.fillStyle =
                        `rgba(${140 + Math.random() * 80},${140 + Math.random() * 80},${140 + Math.random() * 80},${0.3 + Math.random() * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 3 + 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                for (let i = 0; i < 80; i++) {
                    const cx = Math.random() * w,
                        cy = Math.random() * h,
                        cr = 2 + Math.random() * 8;
                    const cg = ctx.createRadialGradient(cx, cy, cr * 0.3, cx, cy, cr);
                    cg.addColorStop(0, 'rgba(200,200,200,0.6)');
                    cg.addColorStop(0.5, 'rgba(100,100,100,0.4)');
                    cg.addColorStop(1, 'rgba(60,60,60,0)');
                    ctx.fillStyle = cg;
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function venusTex() {
            return tex(512, 256, (ctx, w, h) => {
                const g = ctx.createRadialGradient(w * 0.35, h * 0.3, 0, w / 2, h / 2, w * 0.7);
                g.addColorStop(0, '#f5e6c8');
                g.addColorStop(0.4, '#e0c898');
                g.addColorStop(0.8, '#c0a060');
                g.addColorStop(1, '#8a6830');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 800; i++) {
                    ctx.fillStyle =
                        `rgba(${220 + Math.random() * 35},${190 + Math.random() * 40},${140 + Math.random() * 40},${0.05 + Math.random() * 0.15})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 4 + 1, 0, Math.PI * 2);
                    ctx.fill();
                }
                for (let i = 0; i < 10; i++) {
                    ctx.fillStyle =
                        `rgba(240,220,180,${0.08 + Math.random() * 0.12})`;
                    ctx.fillRect(0, (i / 10) * h, w, h / 12);
                }
            });
        }

        function earthTex() {
            return tex(1024, 512, (ctx, w, h) => {
                const ocean = ctx.createLinearGradient(0, 0, 0, h);
                ocean.addColorStop(0, '#1a4c7a');
                ocean.addColorStop(0.3, '#226aaa');
                ocean.addColorStop(0.5, '#3888cc');
                ocean.addColorStop(0.7, '#226aaa');
                ocean.addColorStop(1, '#1a4c7a');
                ctx.fillStyle = ocean;
                ctx.fillRect(0, 0, w, h);
                const continents = [
                    { x: 0.10, y: 0.20, rx: 0.18, ry: 0.24, rot: -0.10 },
                    { x: 0.18, y: 0.32, rx: 0.14, ry: 0.18, rot: 0.15 },
                    { x: 0.30, y: 0.16, rx: 0.20, ry: 0.28, rot: 0.22 },
                    { x: 0.48, y: 0.26, rx: 0.22, ry: 0.20, rot: -0.18 },
                    { x: 0.55, y: 0.50, rx: 0.11, ry: 0.14, rot: 0.32 },
                    { x: 0.72, y: 0.18, rx: 0.17, ry: 0.26, rot: -0.28 },
                    { x: 0.78, y: 0.48, rx: 0.13, ry: 0.12, rot: 0.08 },
                    { x: 0.85, y: 0.24, rx: 0.10, ry: 0.22, rot: -0.18 },
                ];
                continents.forEach(c => {
                    ctx.save();
                    ctx.translate(c.x * w, c.y * h);
                    ctx.rotate(c.rot);
                    const land = ctx.createRadialGradient(0, 0, c.rx * w * 0.08, 0, 0, c.rx * w);
                    land.addColorStop(0, '#8cb86a');
                    land.addColorStop(0.45, '#5a8e3c');
                    land.addColorStop(1, '#3a6028');
                    ctx.fillStyle = land;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, c.rx * w, c.ry * h, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#78a648';
                    ctx.beginPath();
                    ctx.ellipse(c.rx * w * 0.2, -c.ry * h * 0.15, c.rx * w * 0.5, c.ry * h * 0.55, 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
                for (let i = 0; i < 2000; i++) {
                    ctx.fillStyle =
                        `rgba(255,255,255,${0.02 + Math.random() * 0.06})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 5 + 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function marsTex() {
            return tex(512, 256, (ctx, w, h) => {
                const g = ctx.createRadialGradient(w * 0.35, h * 0.3, 0, w / 2, h / 2, w * 0.7);
                g.addColorStop(0, '#e07040');
                g.addColorStop(0.5, '#c04020');
                g.addColorStop(1, '#6a1a08');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 1500; i++) {
                    ctx.fillStyle =
                        `rgba(${200 + Math.random() * 55},${80 + Math.random() * 50},${30 + Math.random() * 30},${0.1 + Math.random() * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 2 + 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                for (let i = 0; i < 8; i++) {
                    const sx = Math.random() * w,
                        sy = Math.random() * h;
                    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 40 + Math.random() * 40);
                    sg.addColorStop(0, 'rgba(80,20,5,0.4)');
                    sg.addColorStop(1, 'rgba(120,40,15,0)');
                    ctx.fillStyle = sg;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 40, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function jupTex() {
            return tex(1024, 512, (ctx, w, h) => {
                const bands = [
                    { y: 0.00, h: 0.07, c: '#dcc8a8' }, { y: 0.07, h: 0.05, c: '#c49864' },
                    { y: 0.12, h: 0.09, c: '#e4d0b4' }, { y: 0.21, h: 0.06, c: '#b47c44' },
                    { y: 0.27, h: 0.10, c: '#d4b484' }, { y: 0.37, h: 0.08, c: '#dcc49c' },
                    { y: 0.45, h: 0.11, c: '#d0a674' }, { y: 0.56, h: 0.07, c: '#c4945c' },
                    { y: 0.63, h: 0.09, c: '#e0ccac' }, { y: 0.72, h: 0.12, c: '#ccac7c' },
                    { y: 0.84, h: 0.06, c: '#b87c44' }, { y: 0.90, h: 0.10, c: '#d8bc94' },
                ];
                bands.forEach(b => {
                    const grad = ctx.createLinearGradient(0, b.y * h, 0, (b.y + b.h) * h);
                    grad.addColorStop(0, b.c);
                    grad.addColorStop(0.5,
                        `rgb(${parseInt(b.c.slice(1,3),16)+25},${parseInt(b.c.slice(3,5),16)+18},${parseInt(b.c.slice(5,7),16)+12})`
                        );
                    grad.addColorStop(1, b.c);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, b.y * h, w, b.h * h);
                });
                for (let i = 0; i < 2000; i++) {
                    ctx.fillStyle =
                        `rgba(${180 + Math.random() * 75},${130 + Math.random() * 60},${80 + Math.random() * 50},${0.02 + Math.random() * 0.06})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * w, Math.random() * h, Math.random() * 2 + 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
                const grsX = w * 0.56,
                    grsY = h * 0.43;
                const grs = ctx.createRadialGradient(grsX, grsY, 0, grsX, grsY, w * 0.08);
                grs.addColorStop(0, 'rgba(230,160,120,0.6)');
                grs.addColorStop(0.4, 'rgba(210,140,100,0.4)');
                grs.addColorStop(0.7, 'rgba(180,120,80,0.2)');
                grs.addColorStop(1, 'rgba(160,100,60,0)');
                ctx.fillStyle = grs;
                ctx.beginPath();
                ctx.ellipse(grsX, grsY, w * 0.08, h * 0.04, 0.04, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function satTex() {
            return tex(1024, 512, (ctx, w, h) => {
                const g = ctx.createLinearGradient(0, 0, 0, h);
                g.addColorStop(0, '#f4e8d0');
                g.addColorStop(0.2, '#f0e0c0');
                g.addColorStop(0.5, '#e0c898');
                g.addColorStop(0.8, '#f0e0c0');
                g.addColorStop(1, '#f4e8d0');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 30; i++) {
                    ctx.fillStyle =
                        `rgba(180,155,120,${0.02 + Math.random() * 0.06})`;
                    ctx.fillRect(0, (i / 30) * h, w, h / 32);
                }
            });
        }

        function uranusTex() {
            return tex(512, 256, (ctx, w, h) => {
                const g = ctx.createRadialGradient(w * 0.35, h * 0.3, 0, w / 2, h / 2, w * 0.7);
                g.addColorStop(0, '#c8e8f8');
                g.addColorStop(0.5, '#88ccf0');
                g.addColorStop(1, '#4a90b8');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 10; i++) {
                    ctx.fillStyle =
                        `rgba(150,220,255,${0.03 + Math.random() * 0.08})`;
                    ctx.fillRect(0, (i / 10) * h, w, h / 11);
                }
            });
        }

        function neptuneTex() {
            return tex(512, 256, (ctx, w, h) => {
                const g = ctx.createRadialGradient(w * 0.35, h * 0.3, 0, w / 2, h / 2, w * 0.7);
                g.addColorStop(0, '#6088e0');
                g.addColorStop(0.5, '#3050b0');
                g.addColorStop(1, '#0a1a50');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 8; i++) {
                    ctx.fillStyle =
                        `rgba(80,140,240,${0.04 + Math.random() * 0.1})`;
                    ctx.fillRect(0, (i / 8) * h, w, h / 9);
                }
                for (let i = 0; i < 5; i++) {
                    const sx = Math.random() * w,
                        sy = Math.random() * h;
                    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 20);
                    sg.addColorStop(0, 'rgba(200,220,255,0.3)');
                    sg.addColorStop(1, 'rgba(60,100,200,0)');
                    ctx.fillStyle = sg;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 20, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // Sun
        const sunGeo = new THREE.SphereGeometry(2.8, 128, 128);
        const sunMesh = new THREE.Mesh(sunGeo, new THREE.MeshBasicMaterial({ map: sunTex() }));
        sunMesh.userData = { key: 'sun' };
        scene.add(sunMesh);
        for (let i = 0; i < 5; i++) {
            const gg = new THREE.SphereGeometry(3.0 + i * 0.9, 64, 64);
            const gm = new THREE.ShaderMaterial({
                uniforms: { uColor: { value: new THREE.Color().setHSL(0.12, 1, 0.4 + i * 0.13) }, uTime: { value: 0 } },
                vertexShader: `varying vec3 vN; varying vec3 vP; void main() { vec4 w = modelMatrix * vec4(position, 1.0); vP = w.xyz; vN = normalize(mat3(modelMatrix) * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `varying vec3 vN; varying vec3 vP; uniform vec3 uColor; uniform float uTime; void main() { float f = 1.0 - abs(dot(normalize(cameraPosition - vP), vN)); f = pow(f, 2.8); gl_FragColor = vec4(uColor, f * 0.28); }`,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });
            const gmh = new THREE.Mesh(gg, gm);
            gmh.userData = { isGlow: true };
            scene.add(gmh);
        }

        // Planets
        const planetDefs = [
            { key: 'mercury', orbit: 5.8, radius: 0.4, speed: 0.46, tex: mercuryTex() },
            { key: 'venus', orbit: 8.5, radius: 0.72, speed: 0.34, tex: venusTex() },
            { key: 'earth', orbit: 11.2, radius: 0.76, speed: 0.27, tex: earthTex() },
            { key: 'mars', orbit: 14.2, radius: 0.5, speed: 0.21, tex: marsTex() },
            { key: 'jupiter', orbit: 20, radius: 2.5, speed: 0.125, tex: jupTex() },
            { key: 'saturn', orbit: 26, radius: 2.0, speed: 0.09, tex: satTex() },
            { key: 'uranus', orbit: 32, radius: 1.35, speed: 0.065, tex: uranusTex() },
            { key: 'neptune', orbit: 37, radius: 1.25, speed: 0.05, tex: neptuneTex() },
        ];

        const orbitGroups = [];
        const planetObjects = [];
        const allClickable = [sunMesh];

        planetDefs.forEach(def => {
            const og = new THREE.Group();
            scene.add(og);
            orbitGroups.push({ group: og, speed: def.speed });
            const pts = [];
            for (let i = 0; i <= 300; i++) {
                const a = (i / 300) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * def.orbit, 0, Math.sin(a) * def.orbit));
            }
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE
                .LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.25, depthTest: true })));
            const pg = new THREE.Group();
            pg.position.set(def.orbit, 0, 0);
            og.add(pg);
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(def.radius, 96, 96), new THREE
                .MeshStandardMaterial({ map: def.tex, roughness: 0.65, metalness: 0.05 }));
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { key: def.key };
            pg.add(mesh);
            allClickable.push(mesh);
            planetObjects.push({ mesh, key: def.key, orbitGroup: og, planetGroup: pg, radius: def.radius });
            if (def.key === 'earth') {
                const ag = new THREE.SphereGeometry(def.radius * 1.08, 64, 64);
                pg.add(new THREE.Mesh(ag, new THREE.ShaderMaterial({
                    uniforms: { uColor: { value: new THREE.Color(0x88bbff) } },
                    vertexShader: `varying vec3 vN; varying vec3 vP; void main() { vec4 w = modelMatrix * vec4(position, 1.0); vP = w.xyz; vN = normalize(mat3(modelMatrix) * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                    fragmentShader: `varying vec3 vN; varying vec3 vP; uniform vec3 uColor; void main() { float f = 1.0 - abs(dot(normalize(cameraPosition - vP), vN)); f = pow(f, 4.0); gl_FragColor = vec4(uColor, f * 0.18); }`,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                })));
            }
            if (def.key === 'saturn') {
                const rg = new THREE.RingGeometry(def.radius * 1.3, def.radius * 2.5, 160);
                const rc = document.createElement('canvas');
                rc.width = 1024;
                rc.height = 64;
                const rctx = rc.getContext('2d');
                const rgr = rctx.createLinearGradient(0, 0, 1024, 0);
                rgr.addColorStop(0, 'rgba(170,145,105,0.02)');
                rgr.addColorStop(0.08, 'rgba(210,180,135,0.75)');
                rgr.addColorStop(0.22, 'rgba(240,215,170,0.9)');
                rgr.addColorStop(0.4, 'rgba(210,185,140,0.7)');
                rgr.addColorStop(0.55, 'rgba(190,165,125,0.45)');
                rgr.addColorStop(0.72, 'rgba(175,150,110,0.15)');
                rgr.addColorStop(1, 'rgba(130,110,70,0.01)');
                rctx.fillStyle = rgr;
                rctx.fillRect(0, 0, 1024, 64);
                const rt = new THREE.CanvasTexture(rc);
                rt.colorSpace = THREE.SRGBColorSpace;
                const rm = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({ map: rt, side: THREE.DoubleSide,
                    transparent: true, opacity: 0.82, depthWrite: true }));
                rm.rotation.x = Math.PI / 2 + 0.42;
                pg.add(rm);
            }
        });

        // Asteroid belt
        const ac = 1500;
        const ap = new Float32Array(ac * 3);
        for (let i = 0; i < ac; i++) {
            const a = Math.random() * Math.PI * 2,
                r = 16.5 + Math.random() * 3.2;
            ap[i * 3] = Math.cos(a) * r;
            ap[i * 3 + 1] = (Math.random() - 0.5) * 1.2;
            ap[i * 3 + 2] = Math.sin(a) * r;
        }
        const ag = new THREE.BufferGeometry();
        ag.setAttribute('position', new THREE.BufferAttribute(ap, 3));
        scene.add(new THREE.Points(ag, new THREE.PointsMaterial({ size: 0.08, color: 0x9999aa, transparent: true,
            opacity: 0.55, depthWrite: true })));

        // Raycaster
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.5;
        let hoveredKey = null,
            pDown = new THREE.Vector2(),
            pTime = 0,
            isDrag = false;

        function getHit(x, y) {
            const m = new THREE.Vector2((x / innerWidth) * 2 - 1, -(y / innerHeight) * 2 + 1);
            raycaster.setFromCamera(m, camera);
            for (const h of raycaster.intersectObjects(allClickable)) { if (h.object.userData.key) return { key: h
                        .object.userData.key }; }
            return null;
        }

        function worldPos(key) { if (key === 'sun') return new THREE.Vector3(0, 0, 0);
            const o = planetObjects.find(p => p.key === key); return o ? o.mesh.getWorldPosition(new THREE.Vector3()) :
                new THREE.Vector3(0, 0, 0); }

        function pRadius(key) { if (key === 'sun') return 2.8;
            const d = planetDefs.find(p => p.key === key); return d ? d.radius : 1; }

        // State machine
        let state = 'idle',
            focusedKey = null,
            animStart = 0;
        const animDur = 1.2;
        let sCam = new THREE.Vector3(),
            sTgt = new THREE.Vector3(),
            eCam = new THREE.Vector3(),
            eTgt = new THREE.Vector3(),
            cTgt = new THREE.Vector3(),
            cCam = new THREE.Vector3();

        function pauseOrbits() { orbitGroups.forEach(g => { g.group.userData.os = g.speed;
                g.speed = 0; }); }

        function resumeOrbits() { orbitGroups.forEach(g => { if (g.group.userData.os !== undefined) g.speed = g.group
                    .userData.os; }); }

        function animateTo(key) {
            const pos = worldPos(key),
                rad = pRadius(key),
                dist = rad * 9 + 5;
            focusedKey = key;
            cTgt.copy(pos);
            cCam.copy(pos).add(new THREE.Vector3(dist * 0.48, dist * 0.4, dist * 0.6));
            sCam.copy(camera.position);
            sTgt.copy(controls.target);
            eTgt.copy(cTgt);
            eCam.copy(cCam);
            animStart = performance.now() / 1000;
            state = 'to';
            controls.autoRotate = false;
            controls.enabled = false;
            pauseOrbits();
            showInfo(key);
        }

        function animateBack() {
            sCam.copy(camera.position);
            sTgt.copy(controls.target);
            eTgt.set(0, 0, 0);
            eCam.set(0, 18, 34);
            animStart = performance.now() / 1000;
            state = 'back';
            controls.enabled = false;
            resumeOrbits();
        }

        function showInfo(key) {
            const d = planetData[key]; if (!d) return;
            infoName.textContent = d.name;
            infoType.textContent = d.type;
            infoFacts.innerHTML = d.facts.map(([l, v]) => `<div><span>${l}:</span> ${v}</div>`).join('');
            infoDesc.textContent = d.desc;
            infoPanel.classList.add('active');
            navArrows.classList.add('active');
            counter.classList.add('active');
            counter.textContent = `${order.indexOf(key) + 1} / ${order.length}`;
            titleArea.style.opacity = '0.22';
            hint.style.opacity = '0';
            tooltip.classList.remove('show');
        }

        function navigate(dir) { if (state !== 'focused') return;
            const idx = order.indexOf(focusedKey); let n = idx + dir; if (n < 0) n = order.length - 1; if (n >= order
                .length) n = 0;
            animateTo(order[n]); }

        // Events
        renderer.domElement.addEventListener('pointerdown', e => { pDown.set(e.clientX, e.clientY);
            pTime = performance.now();
            isDrag = false; });
        renderer.domElement.addEventListener('pointermove', e => {
            if (Math.abs(e.clientX - pDown.x) > 3 || Math.abs(e.clientY - pDown.y) > 3) isDrag = true;
            if (state === 'to' || state === 'back') { tooltip.classList.remove('show');
                document.body.classList.remove('pointer'); return; }
            const h = getHit(e.clientX, e.clientY);
            if (h && h.key) { tooltip.textContent = planetData[h.key]?.name || h.key;
                tooltip.style.left = e.clientX + 'px';
                tooltip.style.top = (e.clientY - 22) + 'px';
                tooltip.classList.add('show');
                document.body.classList.add('pointer');
                hoveredKey = h.key; } else { tooltip.classList.remove('show');
                document.body.classList.remove('pointer');
                hoveredKey = null; }
        });
        renderer.domElement.addEventListener('pointerup', e => {
            const dt = performance.now() - pTime,
                dist = Math.hypot(e.clientX - pDown.x, e.clientY - pDown.y);
            if (dist < 4 && dt < 300 && !isDrag) {
                const h = getHit(e.clientX, e.clientY);
                if (h && h.key) { if (state === 'focused' && h.key === focusedKey) animateBack();
                    else if (state === 'focused') animateTo(h.key);
                    else if (state === 'idle') animateTo(h.key); } else if (state === 'focused') animateBack();
            }
            isDrag = false;
        });
        navLeft.addEventListener('click', e => { e.stopPropagation();
            navigate(-1); });
        navRight.addEventListener('click', e => { e.stopPropagation();
            navigate(1); });
        btnClose.addEventListener('click', e => { e.stopPropagation(); if (state === 'focused') animateBack(); });
        document.addEventListener('keydown', e => { if (state === 'focused') { if (e.key === 'Escape') animateBack();
                else if (e.key === 'ArrowLeft') { e.preventDefault();
                    navigate(-1); } else if (e.key === 'ArrowRight') { e.preventDefault();
                    navigate(1); } } });
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight); });

        // Animation loop
        const clock = new THREE.Clock();

        function animate(ts) {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1),
                now = ts / 1000;
            orbitGroups.forEach(g => { if (g.speed > 0) g.group.rotation.y += g.speed * dt; });
            planetObjects.forEach(o => o.mesh.rotation.y += dt * 0.3);
            sunMesh.rotation.y += dt * 0.03;
            scene.children.forEach(c => { if (c.userData.isGlow && c.material?.uniforms?.uTime) c.material.uniforms
                    .uTime.value = now; });
            if (state === 'to') {
                const t = Math.min((now - animStart) / animDur, 1);
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                camera.position.lerpVectors(sCam, eCam, ease);
                controls.target.lerpVectors(sTgt, eTgt, ease);
                if (t >= 1) { camera.position.copy(eCam);
                    controls.target.copy(eTgt);
                    resumeOrbits();
                    state = 'focused';
                    controls.target.copy(cTgt);
                    controls.enabled = true;
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 0.5;
                    controls.minDistance = 1.5;
                    controls.maxDistance = 28; }
            } else if (state === 'back') {
                const t = Math.min((now - animStart) / animDur, 1);
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                camera.position.lerpVectors(sCam, eCam, ease);
                controls.target.lerpVectors(sTgt, eTgt, ease);
                if (t >= 1) { camera.position.copy(eCam);
                    controls.target.copy(eTgt);
                    state = 'idle';
                    focusedKey = null;
                    controls.target.set(0, 0, 0);
                    controls.enabled = true;
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 0.2;
                    controls.minDistance = 5;
                    controls.maxDistance = 130;
                    infoPanel.classList.remove('active');
                    navArrows.classList.remove('active');
                    counter.classList.remove('active');
                    titleArea.style.opacity = '1';
                    hint.style.opacity = '1'; }
            } else if (state === 'focused') { controls.target.lerp(worldPos(focusedKey), 0.3); }
            controls.update();
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
