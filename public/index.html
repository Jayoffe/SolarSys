<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(8, 8, 22, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --accent: #d4b878;
            --accent-glow: rgba(212, 184, 120, 0.3);
            --text-primary: #f0f0f8;
            --text-secondary: rgba(200, 195, 220, 0.55);
            --text-muted: rgba(180, 175, 200, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', system-ui, sans-serif;
            cursor: grab;
            -webkit-user-select: none; user-select: none;
            color: var(--text-primary);
        }

        body:active { cursor: grabbing; }
        body.pointer { cursor: pointer; }

        canvas { display: block; position: fixed; inset: 0; z-index: 1; }

        .ui-overlay {
            position: fixed; inset: 0; z-index: 10;
            pointer-events: none;
        }

        .vignette {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(2,0,12,0.2) 75%, rgba(2,0,12,0.5) 100%);
            pointer-events: none;
        }

        .top-bar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 24px 28px;
            transition: opacity 0.5s ease;
        }

        .top-bar.hidden { opacity: 0.15; pointer-events: none; }

        .brand h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            color: #e8e2d8;
            text-shadow: 0 0 30px rgba(180, 150, 100, 0.4);
        }

        .brand p {
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .earth-link {
            pointer-events: all;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 9px 18px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            transition: all 0.35s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
        }

        .earth-link:hover {
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
            background: rgba(12, 12, 30, 0.75);
            transform: translateY(-1px);
        }

        .tooltip {
            position: absolute;
            background: rgba(10, 10, 28, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.78rem;
            color: var(--text-primary);
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            font-weight: 400;
        }

        .tooltip.show { opacity: 1; }

        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center;
            padding: 24px 28px 28px;
            transition: opacity 0.5s ease;
        }

        .bottom-bar.hidden { opacity: 0; pointer-events: none; }

        .hint-pill {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 8px 20px;
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            font-weight: 300;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; gap: 14px;
        }

        .info-panel {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%) translateX(20px);
            background: rgba(8, 8, 24, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 28px 32px 24px;
            max-width: 380px;
            width: 340px;
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            text-align: left;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 0.12, 0.15, 1);
            pointer-events: none;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            max-height: 80vh;
            overflow-y: auto;
        }

        .info-panel::-webkit-scrollbar {
            width: 3px;
        }

        .info-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .info-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .info-panel.active {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
            pointer-events: all;
        }

        .info-panel h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            color: #f5efe0;
            font-weight: 500;
            letter-spacing: 0.03em;
            margin-bottom: 4px;
            text-align: left;
        }

        .info-panel .type {
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .info-panel .facts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 16px;
            text-align: left;
            font-size: 0.74rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding: 0;
        }

        .info-panel .facts div {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .info-panel .facts .fact-label {
            color: var(--text-muted);
            font-size: 0.62rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .info-panel .facts .fact-value {
            color: #c8c8e0;
            font-weight: 500;
            font-size: 0.82rem;
        }

        .info-panel .desc {
            font-size: 0.78rem;
            color: rgba(180, 178, 210, 0.7);
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 300;
            max-height: 120px;
            overflow-y: auto;
        }

        .info-panel .desc::-webkit-scrollbar {
            width: 2px;
        }

        .info-panel .desc::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .info-panel .panel-actions {
            display: flex; justify-content: flex-start; gap: 10px;
        }

        .info-panel button {
            padding: 10px 26px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            color: rgba(210, 210, 230, 0.8);
            cursor: pointer;
            font-size: 0.76rem;
            letter-spacing: 0.06em;
            transition: all 0.35s ease;
            font-family: 'Outfit', sans-serif;
            pointer-events: all;
        }

        .info-panel button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.35);
            color: #fff;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .info-panel button.primary {
            background: rgba(212, 184, 120, 0.12);
            border-color: rgba(212, 184, 120, 0.25);
            color: var(--accent);
        }

        .info-panel button.primary:hover {
            background: rgba(212, 184, 120, 0.2);
            border-color: rgba(212, 184, 120, 0.5);
        }

        .nav-bar {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .nav-bar.active { opacity: 1; }

        .nav-arrow {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            transition: all 0.35s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            pointer-events: all;
        }

        .nav-arrow:hover {
            background: rgba(20, 20, 45, 0.85);
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: scale(1.12);
        }

        .counter {
            position: absolute;
            bottom: 108px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: rgba(220, 200, 165, 0.55);
            opacity: 0;
            transition: opacity 0.5s ease;
            font-weight: 300;
        }

        .counter.active { opacity: 1; }

        .planet-strip {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            display: flex;
            gap: 6px;
            padding: 8px 14px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 0.12, 0.15, 1);
            pointer-events: none;
        }

        .planet-strip.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }

        .planet-dot {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid transparent;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .planet-dot::before {
            content: '';
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.4;
        }

        .planet-dot:hover { background: rgba(255, 255, 255, 0.04); }
        .planet-dot:hover::before { opacity: 0.7; transform: scale(1.3); }

        .planet-dot.active {
            background: rgba(212, 184, 120, 0.08);
            border-color: rgba(212, 184, 120, 0.2);
        }

        .planet-dot.active::before {
            opacity: 1;
            transform: scale(1.5);
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .planet-dot .label {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            font-size: 0.6rem;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            transition: all 0.25s ease;
            pointer-events: none;
        }

        .planet-dot:hover .label,
        .planet-dot.active .label {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .top-bar { padding: 16px 18px; }
            .brand h1 { font-size: 0.9rem; }
            .info-panel {
                right: 16px;
                left: 16px;
                top: auto;
                bottom: 80px;
                transform: translateY(20px);
                max-width: 100%;
                width: auto;
                padding: 20px 18px 18px;
                border-radius: 20px;
                max-height: 50vh;
            }
            .info-panel.active {
                transform: translateY(0);
            }
            .info-panel .facts {
                gap: 4px 12px;
                font-size: 0.7rem;
                grid-template-columns: 1fr 1fr;
            }
            .nav-arrow { width: 38px; height: 38px; }
            .planet-strip { gap: 4px; padding: 6px 10px; }
            .planet-dot { width: 28px; height: 28px; }
            .info-panel h2 { font-size: 1.3rem; }
            .info-panel .desc { max-height: 80px; }
        }

        @media (max-width: 480px) {
            .info-panel .facts { grid-template-columns: 1fr; }
            .info-panel {
                bottom: 70px;
                max-height: 45vh;
                padding: 16px 14px 14px;
            }
            .info-panel .panel-actions { flex-wrap: wrap; }
            .info-panel button { padding: 8px 18px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="ui-overlay" id="uiOverlay">
        <div class="vignette"></div>

        <div class="top-bar" id="topBar">
            <div class="brand">
                <h1>SOLAR SYSTEM</h1>
                <p>EXPLORE &middot; DISCOVER</p>
            </div>

        </div>

        <div class="tooltip" id="tooltip"></div>

        <div class="bottom-bar" id="bottomBar">
            <div class="hint-pill">
                <span>Drag to orbit</span>
                <span>Scroll to zoom</span>
                <span>Click a planet</span>
            </div>
        </div>

        <div class="nav-bar" id="navArrows">
            <button class="nav-arrow" id="navLeft">◀</button>
            <button class="nav-arrow" id="navRight">▶</button>
        </div>

        <div class="counter" id="counter">1 / 9</div>

        <div class="planet-strip" id="planetStrip"></div>

        <div class="info-panel" id="infoPanel">
            <h2 id="infoName"></h2>
            <p class="type" id="infoType"></p>
            <div class="facts" id="infoFacts"></div>
            <p class="desc" id="infoDesc"></p>
            <div class="panel-actions">
                <button id="btnClose">Close</button>
                <button class="primary" id="btnExplore">Explore</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const textureLoader = new THREE.TextureLoader();

        const T = {
            sun: 'textures/2k_sun.jpg', mercury: 'textures/2k_mercury.jpg', venus: 'textures/2k_venus_surface.jpg',
            earth: 'textures/2k_earth_daymap.jpg', mars: 'textures/2k_mars.jpg', jupiter: 'textures/2k_jupiter.jpg',
            saturn: 'textures/2k_saturn.jpg', uranus: 'textures/2k_uranus.jpg', neptune: 'textures/2k_neptune.jpg',
            saturn_rings: 'textures/2k_saturn_ring_alpha.png', moon: 'textures/2k_moon.jpg',
        };

        function loadTexture(path, fallback) {
            return new Promise(resolve => {
                textureLoader.load(path, tex => { tex.colorSpace = THREE.SRGBColorSpace; resolve(tex); }, undefined, () => {
                    const c = document.createElement('canvas'); c.width = 512; c.height = 256;
                    const ctx = c.getContext('2d'); const col = new THREE.Color(fallback);
                    ctx.fillStyle = `rgb(${Math.floor(col.r*255)},${Math.floor(col.g*255)},${Math.floor(col.b*255)})`;
                    ctx.fillRect(0, 0, 512, 256);
                    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; resolve(t);
                });
            });
        }

        const el = id => document.getElementById(id);
        const tooltip = el('tooltip'), infoPanel = el('infoPanel'), infoName = el('infoName'),
            infoType = el('infoType'), infoFacts = el('infoFacts'), infoDesc = el('infoDesc'),
            btnClose = el('btnClose'), btnExplore = el('btnExplore'), navArrows = el('navArrows'),
            navLeft = el('navLeft'), navRight = el('navRight'), counter = el('counter'),
            topBar = el('topBar'), bottomBar = el('bottomBar'), planetStrip = el('planetStrip');

        const order = ['sun','mercury','venus','earth','mars','jupiter','saturn','uranus','neptune'];

        // Wikipedia URL mapping
        const wikiUrls = {
            sun: 'https://en.wikipedia.org/wiki/Sun',
            mercury: 'https://en.wikipedia.org/wiki/Mercury_(planet)',
            venus: 'https://en.wikipedia.org/wiki/Venus',
            earth: 'https://en.wikipedia.org/wiki/Earth',
            mars: 'https://en.wikipedia.org/wiki/Mars',
            jupiter: 'https://en.wikipedia.org/wiki/Jupiter',
            saturn: 'https://en.wikipedia.org/wiki/Saturn',
            uranus: 'https://en.wikipedia.org/wiki/Uranus',
            neptune: 'https://en.wikipedia.org/wiki/Neptune'
        };

        // Rich planet data
        const planetData = {
            sun: {
                name: 'Sun',
                type: 'G-Type Main-Sequence Star',
                facts: [
                    ['Diameter', '1,392,700 km'],
                    ['Surface Temp', '5,500°C'],
                    ['Core Temp', '15,000,000°C'],
                    ['Age', '4.6 billion years'],
                    ['Mass', '1.989 × 10³⁰ kg'],
                    ['Composition', 'Hydrogen, Helium']
                ],
                desc: 'The Sun is the star at the center of our solar system. It is a nearly perfect sphere of hot plasma, heated to incandescence by nuclear fusion reactions in its core. The Sun radiates energy mainly as light, ultraviolet, and infrared radiation, and is the most important source of energy for life on Earth. Its gravity holds the solar system together, keeping everything from the biggest planets to the smallest debris in orbit.',
                color: 0xffaa30
            },
            mercury: {
                name: 'Mercury',
                type: 'Terrestrial Planet',
                facts: [
                    ['Diameter', '4,879 km'],
                    ['Distance from Sun', '57.9 million km'],
                    ['Orbital Period', '88 days'],
                    ['Surface Temp', '-180°C to 430°C'],
                    ['Moons', '0'],
                    ['Atmosphere', 'None (trace gases)']
                ],
                desc: 'Mercury is the smallest planet in our solar system and closest to the Sun. It is only slightly larger than Earth\'s Moon. Mercury\'s surface is covered in craters, much like the Moon, from countless impacts over billions of years. Despite its proximity to the Sun, Mercury is not the hottest planet — Venus holds that title. A day on Mercury (sunrise to sunrise) lasts 176 Earth days.',
                color: 0xb0b0b0
            },
            venus: {
                name: 'Venus',
                type: 'Terrestrial Planet',
                facts: [
                    ['Diameter', '12,104 km'],
                    ['Distance from Sun', '108.2 million km'],
                    ['Orbital Period', '225 days'],
                    ['Surface Temp', '462°C (average)'],
                    ['Moons', '0'],
                    ['Atmosphere', 'Carbon Dioxide, Nitrogen']
                ],
                desc: 'Venus is the second planet from the Sun and Earth\'s closest planetary neighbor. It is often called Earth\'s "twin" because of their similar size and mass. However, Venus has the most hostile environment in the solar system — its thick atmosphere traps heat in a runaway greenhouse effect, making it the hottest planet. Venus rotates backwards compared to most other planets, meaning the Sun rises in the west and sets in the east.',
                color: 0xe0c090
            },
            earth: {
                name: 'Earth',
                type: 'Terrestrial Planet',
                facts: [
                    ['Diameter', '12,742 km'],
                    ['Distance from Sun', '149.6 million km'],
                    ['Orbital Period', '365.25 days'],
                    ['Surface Temp', '-89°C to 57°C'],
                    ['Moon', '1 (Luna)'],
                    ['Atmosphere', 'Nitrogen, Oxygen']
                ],
                desc: 'Earth is the third planet from the Sun and the only astronomical object known to harbor life. About 71% of Earth\'s surface is covered in water, earning it the nickname "the Blue Marble." Earth\'s atmosphere, rich in nitrogen and oxygen, protects life from harmful solar radiation. The Moon, Earth\'s only natural satellite, stabilizes our planet\'s axial tilt, creating relatively stable seasons that have allowed life to flourish.',
                color: 0x4a90e0
            },
            mars: {
                name: 'Mars',
                type: 'Terrestrial Planet',
                facts: [
                    ['Diameter', '6,779 km'],
                    ['Distance from Sun', '227.9 million km'],
                    ['Orbital Period', '687 days'],
                    ['Surface Temp', '-140°C to 20°C'],
                    ['Moons', '2 (Phobos, Deimos)'],
                    ['Atmosphere', 'Carbon Dioxide, Argon']
                ],
                desc: 'Mars is the fourth planet from the Sun — a dusty, cold, desert world with a very thin atmosphere. Mars is a dynamic planet with seasons, polar ice caps, canyons, extinct volcanoes, and evidence that it was even more active in the past. It is home to Olympus Mons, the largest volcano and highest known mountain in the solar system, and Valles Marineris, one of the largest canyons. Mars has been explored by numerous rovers and orbiters.',
                color: 0xd05030
            },
            jupiter: {
                name: 'Jupiter',
                type: 'Gas Giant',
                facts: [
                    ['Diameter', '139,820 km'],
                    ['Distance from Sun', '778.6 million km'],
                    ['Orbital Period', '11.86 years'],
                    ['Cloud Temp', '-145°C'],
                    ['Moons', '95+'],
                    ['Composition', 'Hydrogen, Helium']
                ],
                desc: 'Jupiter is the largest planet in our solar system — a gas giant with a mass more than twice that of all the other planets combined. Its Great Red Spot is a giant storm bigger than Earth that has raged for hundreds of years. Jupiter has a faint ring system and dozens of moons, including the four large Galilean moons: Io, Europa, Ganymede, and Callisto. Ganymede is the largest moon in the solar system, even bigger than Mercury.',
                color: 0xd0a870
            },
            saturn: {
                name: 'Saturn',
                type: 'Gas Giant',
                facts: [
                    ['Diameter', '116,460 km'],
                    ['Distance from Sun', '1.434 billion km'],
                    ['Orbital Period', '29.46 years'],
                    ['Cloud Temp', '-178°C'],
                    ['Moons', '146+'],
                    ['Composition', 'Hydrogen, Helium']
                ],
                desc: 'Saturn is the sixth planet from the Sun and the second-largest in our solar system. Adorned with a dazzling, complex system of icy rings, Saturn is unique among the planets. Its rings are made mostly of ice particles, rocky debris, and dust. Saturn is a gas giant, composed primarily of hydrogen and helium. It has dozens of moons, including Titan — the second-largest moon in the solar system and the only moon known to have a dense atmosphere and liquid on its surface.',
                color: 0xe8d8a0
            },
            uranus: {
                name: 'Uranus',
                type: 'Ice Giant',
                facts: [
                    ['Diameter', '50,724 km'],
                    ['Distance from Sun', '2.871 billion km'],
                    ['Orbital Period', '84.01 years'],
                    ['Cloud Temp', '-224°C'],
                    ['Moons', '27'],
                    ['Composition', 'Water, Methane, Ammonia']
                ],
                desc: 'Uranus is the seventh planet from the Sun and has the third-largest diameter in our solar system. It was the first planet found with the aid of a telescope, discovered in 1781 by astronomer William Herschel. Uranus rotates on its side — its axis is tilted at almost 98 degrees, likely from a massive ancient collision. This unique tilt causes the most extreme seasons in the solar system, with each pole getting 42 years of continuous sunlight followed by 42 years of darkness.',
                color: 0x88ccff
            },
            neptune: {
                name: 'Neptune',
                type: 'Ice Giant',
                facts: [
                    ['Diameter', '49,244 km'],
                    ['Distance from Sun', '4.495 billion km'],
                    ['Orbital Period', '164.8 years'],
                    ['Cloud Temp', '-218°C'],
                    ['Moons', '16'],
                    ['Composition', 'Water, Methane, Ammonia']
                ],
                desc: 'Neptune is the eighth and most distant major planet in our solar system. It was the first planet located through mathematical predictions rather than through direct observation — French astronomer Urbain Le Verrier calculated its position in 1846. Neptune is an ice giant, dark, cold, and whipped by supersonic winds — the fastest in the solar system, reaching speeds of 2,100 km/h. Its vivid blue color comes from methane in its atmosphere absorbing red light.',
                color: 0x4470e0
            }
        };

        // Build planet strip
        order.forEach((key) => {
            const dot = document.createElement('div');
            dot.className = 'planet-dot';
            dot.dataset.key = key;
            dot.style.color = '#' + new THREE.Color(planetData[key].color).getHexString();
            dot.innerHTML = `<span class="label">${planetData[key].name}</span>`;
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                if (state === 'focused' && focusedKey === key) return;
                animateTo(key);
            });
            planetStrip.appendChild(dot);
        });

        function updateStrip(activeKey) {
            planetStrip.querySelectorAll('.planet-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.key === activeKey);
            });
        }

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020212);
        const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.2, 3000);
        camera.position.set(0, 18, 34);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.minDistance = 5; controls.maxDistance = 800;
        controls.maxPolarAngle = Math.PI * 0.95;
        controls.zoomSpeed = 0.8;
        controls.autoRotate = true; controls.autoRotateSpeed = 0.15;
        controls.update();

        scene.add(new THREE.AmbientLight(0x1a1a40, 0.5));
        const sunLight = new THREE.PointLight(0xffffff, 550, 0, 1.8);
        sunLight.position.set(0,0,0); scene.add(sunLight);
        scene.add(new THREE.HemisphereLight(0x334477, 0x111133, 0.3));

        // Starfield
        const starfieldGroup = new THREE.Group();
        function createStarfield() {
            const g1 = new THREE.BufferGeometry(); const c1 = 6000; const p1 = new Float32Array(c1*3); const col1 = new Float32Array(c1*3);
            for(let i=0;i<c1;i++){const r=150+Math.random()*800,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);p1[i*3]=Math.sin(ph)*Math.cos(th)*r;p1[i*3+1]=Math.sin(ph)*Math.sin(th)*r;p1[i*3+2]=Math.cos(ph)*r;const t=Math.random();if(t<0.03){col1[i*3]=1;col1[i*3+1]=0.85;col1[i*3+2]=0.5}else if(t<0.08){col1[i*3]=0.5;col1[i*3+1]=0.6;col1[i*3+2]=1}else{const b=0.5+Math.random()*0.5;col1[i*3]=b;col1[i*3+1]=b;col1[i*3+2]=b}}
            g1.setAttribute('position',new THREE.BufferAttribute(p1,3));g1.setAttribute('color',new THREE.BufferAttribute(col1,3));
            starfieldGroup.add(new THREE.Points(g1,new THREE.PointsMaterial({size:0.22,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.85,sizeAttenuation:true})));
        }
        createStarfield();scene.add(starfieldGroup);

        const orbitGroups=[],planetObjects=[],allClickable=[];
        let sunMesh;

        async function createSolarSystem() {
            const sunTex=await loadTexture(T.sun,'#ffaa30');
            sunMesh=new THREE.Mesh(new THREE.SphereGeometry(2.8,128,128),new THREE.MeshBasicMaterial({map:sunTex}));
            sunMesh.userData={key:'sun'};scene.add(sunMesh);allClickable.push(sunMesh);

            for(let i=0;i<4;i++){const gg=new THREE.SphereGeometry(2.85+i*0.8,64,64);const gm=new THREE.ShaderMaterial({uniforms:{uColor:{value:new THREE.Color().setHSL(0.13,1,0.35+i*0.14)},uTime:{value:0}},vertexShader:`varying vec3 vN;varying vec3 vP;void main(){vec4 w=modelMatrix*vec4(position,1.0);vP=w.xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`varying vec3 vN;varying vec3 vP;uniform vec3 uColor;uniform float uTime;void main(){float f=1.0-abs(dot(normalize(cameraPosition-vP),vN));f=pow(f,2.2);gl_FragColor=vec4(uColor,f*0.4);}`,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});scene.add(new THREE.Mesh(gg,gm))}

            const planetDefs=[
                {key:'mercury',orbit:5.8,radius:0.38,speed:0.46,tex:T.mercury},
                {key:'venus',orbit:8.5,radius:0.72,speed:0.34,tex:T.venus},
                {key:'earth',orbit:11.2,radius:0.74,speed:0.27,tex:T.earth,moon:true},
                {key:'mars',orbit:14.2,radius:0.48,speed:0.21,tex:T.mars},
                {key:'jupiter',orbit:20,radius:2.4,speed:0.125,tex:T.jupiter,glow:0xffaa66},
                {key:'saturn',orbit:26,radius:1.9,speed:0.09,tex:T.saturn,rings:true,glow:0xddcc88},
                {key:'uranus',orbit:32,radius:1.3,speed:0.065,tex:T.uranus,glow:0x88ccff},
                {key:'neptune',orbit:37,radius:1.2,speed:0.05,tex:T.neptune,glow:0x4488ff},
            ];

            for(const def of planetDefs){
                const og=new THREE.Group();scene.add(og);orbitGroups.push({group:og,speed:def.speed});
                const pts=[];for(let i=0;i<=300;i++){const a=(i/300)*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*def.orbit,0,Math.sin(a)*def.orbit))}
                scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x223355,transparent:true,opacity:0.2})));
                const pg=new THREE.Group();pg.position.set(def.orbit,0,0);og.add(pg);
                const tex=await loadTexture(def.tex,0xffffff);
                const mesh=new THREE.Mesh(new THREE.SphereGeometry(def.radius,96,96),new THREE.MeshStandardMaterial({map:tex,roughness:0.7,metalness:0.05}));
                mesh.userData={key:def.key};pg.add(mesh);allClickable.push(mesh);
                planetObjects.push({mesh,key:def.key,orbitGroup:og,planetGroup:pg,radius:def.radius});
                if(def.moon){const mo=new THREE.Group();pg.add(mo);const mt=await loadTexture(T.moon,0xcccccc);const mm=new THREE.Mesh(new THREE.SphereGeometry(0.2,48,48),new THREE.MeshStandardMaterial({map:mt,roughness:0.7}));mm.position.set(1.2,0,0);mo.add(mm);planetObjects.push({mesh:mm,key:'moon',orbitGroup:null,planetGroup:mo,radius:0.2,isMoon:true})}
                if(def.key==='earth'){const ag=new THREE.SphereGeometry(def.radius*1.06,64,64);pg.add(new THREE.Mesh(ag,new THREE.ShaderMaterial({uniforms:{uColor:{value:new THREE.Color(0x88bbff)}},vertexShader:`varying vec3 vN;varying vec3 vP;void main(){vec4 w=modelMatrix*vec4(position,1.0);vP=w.xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`varying vec3 vN;varying vec3 vP;uniform vec3 uColor;void main(){float f=1.0-abs(dot(normalize(cameraPosition-vP),vN));f=pow(f,3.5);gl_FragColor=vec4(uColor,f*0.3);}`,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending})))}
                if(def.glow){const gg=new THREE.SphereGeometry(def.radius*1.08,64,64);pg.add(new THREE.Mesh(gg,new THREE.ShaderMaterial({uniforms:{uColor:{value:new THREE.Color(def.glow)}},vertexShader:`varying vec3 vN;varying vec3 vP;void main(){vec4 w=modelMatrix*vec4(position,1.0);vP=w.xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`varying vec3 vN;varying vec3 vP;uniform vec3 uColor;void main(){float f=1.0-abs(dot(normalize(cameraPosition-vP),vN));f=pow(f,3.0);gl_FragColor=vec4(uColor,f*0.15);}`,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending})))}
                if(def.rings){const rg=new THREE.RingGeometry(def.radius*1.3,def.radius*2.5,160);const rt=await loadTexture(T.saturn_rings,'#e8d8a0');rt.colorSpace=THREE.SRGBColorSpace;const rm=new THREE.Mesh(rg,new THREE.MeshBasicMaterial({map:rt,side:THREE.DoubleSide,transparent:true,opacity:0.85}));rm.rotation.x=Math.PI/2+0.42;pg.add(rm)}
            }
        }

        await createSolarSystem();

        const raycaster=new THREE.Raycaster();let hoveredKey=null,pDown=new THREE.Vector2(),pTime=0,isDrag=false;
        function getHit(x,y){const m=new THREE.Vector2((x/innerWidth)*2-1,-(y/innerHeight)*2+1);raycaster.setFromCamera(m,camera);for(const h of raycaster.intersectObjects(allClickable)){if(h.object.userData.key)return{key:h.object.userData.key}}return null}
        function worldPos(key){if(key==='sun')return new THREE.Vector3(0,0,0);const o=planetObjects.find(p=>p.key===key);return o?o.mesh.getWorldPosition(new THREE.Vector3()):new THREE.Vector3()}
        function pRadius(key){const r={sun:2.8,mercury:0.38,venus:0.72,earth:0.74,mars:0.48,jupiter:2.4,saturn:1.9,uranus:1.3,neptune:1.2,moon:0.2};return r[key]||1}

        let state='idle',focusedKey=null,animStart=0;const animDur=1.2;
        let sCam=new THREE.Vector3(),sTgt=new THREE.Vector3(),eCam=new THREE.Vector3(),eTgt=new THREE.Vector3(),cTgt=new THREE.Vector3(),cCam=new THREE.Vector3();
        function pauseOrbits(){orbitGroups.forEach(g=>{g.group.userData.os=g.speed;g.speed=0})}
        function resumeOrbits(){orbitGroups.forEach(g=>{if(g.group.userData.os!==undefined)g.speed=g.group.userData.os})}

        function animateTo(key){
            const pos=worldPos(key),rad=pRadius(key),dist=rad*9+5;
            focusedKey=key;
            cTgt.copy(pos);cCam.copy(pos).add(new THREE.Vector3(dist*0.48,dist*0.4,dist*0.6));
            sCam.copy(camera.position);sTgt.copy(controls.target);
            eTgt.copy(cTgt);eCam.copy(cCam);
            animStart=performance.now()/1000;
            state='to';controls.autoRotate=false;controls.enabled=false;
            pauseOrbits();showInfo(key);updateStrip(key);
        }

        function animateBack(){
            sCam.copy(camera.position);sTgt.copy(controls.target);
            eTgt.set(0,0,0);eCam.set(0,18,34);
            animStart=performance.now()/1000;
            state='back';controls.enabled=false;resumeOrbits();
        }

        function showInfo(key){
            const d=planetData[key];if(!d)return;
            infoName.textContent=d.name;
            infoType.textContent=d.type;
            infoFacts.innerHTML=d.facts.map(([l,v])=>`<div><div class="fact-label">${l}</div><div class="fact-value">${v}</div></div>`).join('');
            infoDesc.textContent=d.desc;
            infoPanel.classList.add('active');
            navArrows.classList.add('active');
            counter.classList.add('active');
            planetStrip.classList.add('active');
            counter.textContent=`${order.indexOf(key)+1} / ${order.length}`;
            topBar.classList.add('hidden');
            bottomBar.classList.add('hidden');
            tooltip.classList.remove('show');
        }

        function navigate(dir){
            if(state!=='focused')return;
            const idx=order.indexOf(focusedKey);
            let n=idx+dir;
            if(n<0)n=order.length-1;
            if(n>=order.length)n=0;
            animateTo(order[n]);
        }

        renderer.domElement.addEventListener('pointerdown',e=>{pDown.set(e.clientX,e.clientY);pTime=performance.now();isDrag=false});
        renderer.domElement.addEventListener('pointermove',e=>{
            if(Math.abs(e.clientX-pDown.x)>3||Math.abs(e.clientY-pDown.y)>3)isDrag=true;
            if(state==='to'||state==='back'){tooltip.classList.remove('show');document.body.classList.remove('pointer');return}
            const h=getHit(e.clientX,e.clientY);
            if(h&&h.key){
                tooltip.textContent=planetData[h.key]?.name||h.key;
                tooltip.style.left=(e.clientX+16)+'px';
                tooltip.style.top=(e.clientY-12)+'px';
                tooltip.classList.add('show');
                document.body.classList.add('pointer');
                hoveredKey=h.key;
            }else{tooltip.classList.remove('show');document.body.classList.remove('pointer');hoveredKey=null}
        });
        renderer.domElement.addEventListener('pointerup',e=>{
            const dt=performance.now()-pTime,dist=Math.hypot(e.clientX-pDown.x,e.clientY-pDown.y);
            if(dist<4&&dt<300&&!isDrag){
                const h=getHit(e.clientX,e.clientY);
                if(h&&h.key){
                    if(state==='focused'&&h.key===focusedKey)animateBack();
                    else if(state==='focused')animateTo(h.key);
                    else if(state==='idle')animateTo(h.key);
                }else if(state==='focused')animateBack();
            }
            isDrag=false;
        });

        navLeft.addEventListener('click',e=>{e.stopPropagation();navigate(-1)});
        navRight.addEventListener('click',e=>{e.stopPropagation();navigate(1)});
        btnClose.addEventListener('click',e=>{e.stopPropagation();if(state==='focused')animateBack()});
        btnExplore.addEventListener('click',e=>{
            e.stopPropagation();
            if(focusedKey && wikiUrls[focusedKey]) {
                window.open(wikiUrls[focusedKey], '_blank');
            }
        });

        document.addEventListener('keydown',e=>{
            if(state==='focused'){
                if(e.key==='Escape')animateBack();
                else if(e.key==='ArrowLeft'){e.preventDefault();navigate(-1)}
                else if(e.key==='ArrowRight'){e.preventDefault();navigate(1)}
            }
        });

        window.addEventListener('resize',()=>{
            camera.aspect=innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth,innerHeight);
        });

        const clock=new THREE.Clock();
        function animate(ts){
            requestAnimationFrame(animate);
            const dt=Math.min(clock.getDelta(),0.1),now=ts/1000;

            orbitGroups.forEach(g=>{if(g.speed>0)g.group.rotation.y+=g.speed*dt});
            planetObjects.forEach(o=>{o.mesh.rotation.y+=dt*0.3;if(o.isMoon&&o.planetGroup)o.planetGroup.rotation.y+=dt*2.5});
            if(sunMesh)sunMesh.rotation.y+=dt*0.03;
            scene.children.forEach(c=>{if(c.userData?.isGlow&&c.material?.uniforms?.uTime)c.material.uniforms.uTime.value=now});

            if(state==='to'){
                const t=Math.min((now-animStart)/animDur,1);
                const ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
                camera.position.lerpVectors(sCam,eCam,ease);
                controls.target.lerpVectors(sTgt,eTgt,ease);
                if(t>=1){camera.position.copy(eCam);controls.target.copy(eTgt);resumeOrbits();state='focused';controls.target.copy(cTgt);controls.enabled=true;controls.autoRotate=true;controls.autoRotateSpeed=0.5;controls.minDistance=1.5;controls.maxDistance=28}
            }else if(state==='back'){
                const t=Math.min((now-animStart)/animDur,1);
                const ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
                camera.position.lerpVectors(sCam,eCam,ease);
                controls.target.lerpVectors(sTgt,eTgt,ease);
                if(t>=1){camera.position.copy(eCam);controls.target.copy(eTgt);state='idle';focusedKey=null;controls.target.set(0,0,0);controls.enabled=true;controls.autoRotate=true;controls.autoRotateSpeed=0.15;controls.minDistance=5;controls.maxDistance=800;infoPanel.classList.remove('active');navArrows.classList.remove('active');counter.classList.remove('active');planetStrip.classList.remove('active');topBar.classList.remove('hidden');bottomBar.classList.remove('hidden')}
            }else if(state==='focused'){controls.target.lerp(worldPos(focusedKey),0.3)}

            controls.update();
            renderer.render(scene,camera);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
